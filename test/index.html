        <script type="module">
            const shouldSilenceConsoleErrors = true;

            // this replaces the error console with empty fn when tests run
            if (shouldSilenceConsoleErrors) {
                let consoleOld;

                beforeEach(function () {
                    consoleOld = console.error;
                    console.error = () => {};
                });

                afterEach(function () {
                    console.error = consoleOld;
                });
            }
